name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ln-ai-network

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check ai/ mcp/ scripts/security.py scripts/ui_server.py

  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          find ln-ai-network -name '*.sh' \
            -not -path '*/\.venv/*' \
            -not -path '*/node_modules/*' \
            -print0 | xargs -0 shellcheck --severity=warning

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ln-ai-network

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov pytest-playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run tests with coverage
        run: python -m pytest ai/tests/ -v --tb=short --cov=ai --cov=scripts --cov-report=term-missing --cov-report=html:coverage-html

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ln-ai-network/coverage-html/
